<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Admin - Sistem Informasi Perpustakaan</title>
  
  <!-- Local Stylesheets & Flowbite -->
  <link href="../css/style.css" rel="stylesheet">
  <link href="/vendor/flowbite/flowbite.min.css" rel="stylesheet" />
  
  <!-- FontAwesome for Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', sans-serif;
    }
  </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 min-h-screen flex items-center justify-center p-4">
  
  <div class="w-full max-w-md p-4 bg-white border border-gray-200 rounded-lg shadow sm:p-6 md:p-8 dark:bg-gray-800 dark:border-gray-700">
    <div class="text-center mb-6">
      <div class="inline-flex items-center justify-center w-12 h-12 rounded-lg bg-blue-100 dark:bg-blue-900 text-blue-600 dark:text-blue-300 mb-3 text-xl">
        <i class="fa-solid fa-book-open-reader"></i>
      </div>
      <h2 class="text-xl font-bold text-gray-900 dark:text-white">Perpustakaan Kampus</h2>
      <p class="text-gray-500 dark:text-gray-400 text-xs mt-1">Portal Administrasi Sistem Informasi</p>
    </div>

    <form id="loginForm" class="space-y-6">
      <div id="alertBox" class="hidden p-4 mb-4 text-sm text-red-800 rounded-lg bg-red-50 dark:bg-gray-800 dark:text-red-400 border border-red-200 dark:border-red-800" role="alert">
        <div class="flex items-center">
          <i class="fa-solid fa-circle-exclamation mr-2"></i>
          <span id="alertMsg">Username atau password salah!</span>
        </div>
      </div>

      <div>
        <label for="username" class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">Username</label>
        <input type="text" id="username" name="username" required
          class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500"
          placeholder="admin">
      </div>

      <div>
        <label for="password" class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">Password</label>
        <input type="password" id="password" name="password" required
          class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500"
          placeholder="••••••••">
      </div>

      <button type="submit" id="submitBtn"
        class="w-full text-white bg-blue-700 hover:bg-blue-800 focus:ring-4 focus:outline-none focus:ring-blue-300 font-medium rounded-lg text-sm px-5 py-2.5 text-center dark:bg-blue-600 dark:hover:bg-blue-700 dark:focus:ring-blue-800 flex items-center justify-center gap-2">
        <span>Masuk Aplikasi</span>
        <i class="fa-solid fa-arrow-right text-xs"></i>
      </button>
    </form>
  </div>

  <!-- Scripts -->
  <script src="../js/auth.js"></script>
  <script>
    // Run verification on page load
    window.addEventListener('DOMContentLoaded', async () => {
      await checkAuth();
    });

    const loginForm = document.getElementById('loginForm');
    const alertBox = document.getElementById('alertBox');
    const alertMsg = document.getElementById('alertMsg');
    const submitBtn = document.getElementById('submitBtn');

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const usernameVal = document.getElementById('username').value;
      const passwordVal = document.getElementById('password').value;
      
      submitBtn.disabled = true;
      submitBtn.innerHTML = `
        <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        Menghubungkan...
      `;
      
      alertBox.classList.add('hidden');
      
      const res = await login(usernameVal, passwordVal);
      
      if (res.success) {
        window.location.href = '/dashboard';
      } else {
        alertMsg.textContent = res.message;
        alertBox.classList.remove('hidden');
        
        submitBtn.disabled = false;
        submitBtn.innerHTML = `
          <span>Masuk Aplikasi</span>
          <i class="fa-solid fa-arrow-right text-xs"></i>
        `;
      }
    });
  </script>
</body>
</html>
